name: save news

on:
  repository_dispatch:
    types: [run]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Execute Python scripts
        run: |
          chmod +x ./news/scripts/*.py
          find ./news/scripts/*.py -type f -perm -u=x -print0 | xargs -0 -n 1 -P 2 python3
          
      - name: Execute shell scripts
        run: |
          chmod +x ./news/scripts/*.sh
          find ./news/scripts/*.sh -type f -perm -u=x -print0 | xargs -0 -n 1 -P 4 sh

      - name: Configure Git
        run: |
          git config --global user.email "hemengzhi88@gmail.com"
          git config --global user.name "genkin-he"
          
      - name: Commit and push changes
        run: |
          git add .
          git commit -m "save post"
          git push origin main