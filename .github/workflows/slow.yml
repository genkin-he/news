name: save slow news

on:
  # push:
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron: "*/30 * * * *"
 
jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      - name: excute python
        run: chmod +x ./news/scripts/*.py && for f in ./news/scripts/slow/*.py ; do [ -x "$f" ] && [ ! -d "$f" ] && echo $f && python3 $f ; done
      - name: excute shell
        run: chmod +x ./news/scripts/slow/*.sh && for f in ./news/scripts/slow/*.sh ; do [ -x "$f" ] && [ ! -d "$f" ] && echo $f && "$f" ; done
      - name: config git
        run: git config --global user.email "hemengzhi88@gmail.com"&&git config --global user.name "genkin-he"
      - name: submit
        run: git add . && git commit -m "save post" && git push origin main
